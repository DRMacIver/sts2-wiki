name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Generate content from data
        run: |
          uv run python -m scripts.generate_cards data/v0.98.2 site/src/content/cards
          uv run python -m scripts.generate_powers data/v0.98.2 site/src/content/powers
          uv run python -m scripts.generate_monsters data/v0.98.2 site/src/content/monsters
          uv run python -m scripts.generate_encounters data/v0.98.2 site/src/content/encounters
          uv run python -m scripts.generate_potions data/v0.98.2 site/src/content/potions
          uv run python -m scripts.generate_relics data/v0.98.2 site/src/content/relics
          uv run python -m scripts.generate_ancients data/v0.98.2 site/src/content/ancients
          uv run python -m scripts.generate_events data/v0.98.2 site/src/content/events
          uv run python -m scripts.generate_epochs data/v0.98.2 site/src/content/epochs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci
        working-directory: site

      - run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
